<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaghar Box</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; margin: 0; }
        .header { background: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hero { background: #fc8019; color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 500px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .add-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>Vaghar Box 📦</h1></div>
    <div class="hero"><h2>Premium Spices</h2></div>
    <div class="container">
        <div class="card">
            <div><h3>Garam Masala</h3><p>₹150</p></div>
            <button class="add-btn" onclick="alert('Added!')">ADD</button>
        </div>
    </div>
</body>
</html>
