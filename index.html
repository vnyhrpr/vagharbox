<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaghar Box - Premium Spices</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #fc8019; --dark: #282c3f; --light: #f4f6f8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; margin: 0; }
        .hero { background: var(--dark); color: white; padding: 40px 20px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
        .food-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s; }
        .food-card:hover { transform: translateY(-10px); }
        .food-card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .add-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Vaghar Box 📦</h1>
        <p>Authentic Flavors, Delivered to your Doorstep.</p>
    </div>
    <div class="menu-grid">
        <div class="food-card">
            <img src="https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=500" alt="Masala">
            <div class="card-content">
                <h3>Special Garam Masala</h3>
                <p>₹150 | Kathiyawadi Special</p>
                <button class="add-btn" onclick="alert('Added!')">Add to Cart</button>
            </div>
        </div>
    </div>
</body>
</html>
