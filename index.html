<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaghar Box - Premium Authentic Spices</title>
    <style>
        :root { --primary: #fc8019; --dark: #282c3f; --light: #f4f6f8; --green: #60b246; }
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #fff; color: var(--dark); }
        header { background-color: white; padding: 15px 24px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 99; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px 100px; }
        .menu-item { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #edebef; }
        .add-btn { background: white; border: 1px solid var(--green); color: var(--green); padding: 8px 25px; border-radius: 6px; cursor: pointer; font-weight: 700; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; width: 90%; max-width: 400px; border-radius: 12px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .checkout-btn { width: 100%; background: var(--green); color: white; border: none; padding: 15px; cursor: pointer; font-weight: 700; border-radius: 4px; }
        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 760px; background: var(--green); color: white; padding: 15px; border-radius: 8px; display: none; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header><h1>Vaghar Box 📦</h1></header>

<div class="container">
    <h2>Recommended Items</h2>
    <div class="menu-item">
        <div><h3>Special Garam Masala</h3><p>₹150</p></div>
        <button class="add-btn" onclick="addToCart('Special Garam Masala', 150)">ADD</button>
    </div>
    <div class="menu-item">
        <div><h3>Kathiyawadi Garlic Chutney</h3><p>₹100</p></div>
        <button class="add-btn" onclick="addToCart('Kathiyawadi Garlic Chutney', 100)">ADD</button>
    </div>
    <div class="menu-item">
        <div><h3>Gujarati Dal Masala</h3><p>₹120</p></div>
        <button class="add-btn" onclick="addToCart('Gujarati Dal Masala', 120)">ADD</button>
    </div>
</div>

<div class="cart-bar" id="cartBar">
    <span id="cartTotal">0 Items</span>
    <button style="background:none; border:none; color:white; font-weight:700; cursor:pointer;" onclick="showCheckout()">Checkout ➔</button>
</div>

<div class="modal" id="checkoutModal">
    <div class="modal-content">
        <h2>Enter Delivery Details</h2>
        <input type="text" id="custName" placeholder="Your Name" required>
        <input type="tel" id="custPhone" placeholder="Phone Number" required>
        <textarea id="custAddress" placeholder="Delivery Address" rows="3" required></textarea>
        <button class="checkout-btn" onclick="processOrder()">Place Order on WhatsApp</button>
        <p style="text-align:center; cursor:pointer; color:red;" onclick="document.getElementById('checkoutModal').style.display='none'">Cancel</p>
    </div>
</div>

<script>
    let cart = []; let total = 0;
    function addToCart(name, price) {
        cart.push(name); total += price;
        document.getElementById('cartBar').style.display = 'flex';
        document.getElementById('cartTotal').innerText = cart.length + " Item(s) | Total: ₹" + total;
    }
    function showCheckout() { document.getElementById('checkoutModal').style.display = 'flex'; }
    function processOrder() {
        let name = document.getElementById('custName').value;
        let phone = document.getElementById('custPhone').value;
        let address = document.getElementById('custAddress').value;
        if(!name || !phone || !address) { alert("Please fill all details!"); return; }
        let phoneNumber = "919999999999"; 
        let msg = `*New Order*%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}%0AItems: ${cart.join(', ')}%0ATotal: ₹${total}`;
        window.open(`https://wa.me/${phoneNumber}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
