<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaghar Box - Premium Spices</title>
    <style>
        :root { --primary: #fc8019; --dark: #282c3f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fdfdfd; }
        .hero { background: var(--dark); color: white; padding: 40px 20px; text-align: center; }
        .menu-container { max-width: 800px; margin: 20px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 150px; border-radius: 15px; object-fit: cover; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .floating-cart { position: fixed; bottom: 20px; background: #28a745; color: white; width: 90%; left: 5%; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; display: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="hero">
    <h1>Vaghar Box 📦</h1>
    <p>Authentic Kathiyawadi Flavors</p>
</div>

<div class="menu-container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=500" alt="Masala">
        <h3>Garam Masala</h3>
        <p>₹150</p>
        <button class="add-btn" onclick="addToCart('Garam Masala', 150)">Add to Cart</button>
    </div>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1626132647523-66f5bf380027?w=500" alt="Chutney">
        <h3>Garlic Chutney</h3>
        <p>₹100</p>
        <button class="add-btn" onclick="addToCart('Garlic Chutney', 100)">Add to Cart</button>
    </div>
</div>

<div id="cart" class="floating-cart" onclick="checkout()">
    View Order (Total: ₹<span id="total">0</span>)
</div>

<script>
    let total = 0; let items = [];
    function addToCart(name, price) {
        total += price; items.push(name);
        document.getElementById('total').innerText = total;
        document.getElementById('cart').style.display = 'block';
    }
    function checkout() {
        let msg = "Order: " + items.join(", ") + " | Total: ₹" + total;
        window.open("https://wa.me/919999999999?text=" + encodeURIComponent(msg));
    }
</script>
</body>
</html>
